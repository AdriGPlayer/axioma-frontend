<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Panel de Administración</title>
<style>
  :root {
    --crema: #f5efe2;
    --crema-claro: #fbf7ee;
    --cafe: #6b4a2f;
    --cafe-oscuro: #4a3220;
    --cafe-claro: #9c7a55;
    --rojo: #b23a2e;
    --texto: #3a2c1f;
    --borde: #e3d7c2;
    --sombra: 0 8px 24px rgba(74, 50, 32, 0.12);
  }

  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: var(--crema);
    color: var(--texto);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ===== Header ===== */
  header .header-panel-minerva {
    background: var(--cafe-oscuro);
    color: var(--crema-claro);
    padding: 16px 28px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 16px;
    box-shadow: var(--sombra);
    position: sticky;
    top: 0;
    z-index: 10;
  }

  .brand-panel-minerva {
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .brand-logo-panel-minerva {
    width: 44px;
    height: 44px;
    border-radius: 12px;
    background: var(--rojo);
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 700;
    font-size: 20px;
    color: var(--crema-claro);
    flex-shrink: 0;
  }

  .brand-text-panel-minerva h1 {
    font-size: 18px;
    font-weight: 700;
    letter-spacing: 0.3px;
  }

  .brand-text-panel-minerva span {
    font-size: 12px;
    color: var(--cafe-claro);
    opacity: 0.9;
  }

  .user-area-panel-minerva {
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .user-info-panel-minerva {
    text-align: right;
    line-height: 1.3;
  }

  .user-info-panel-minerva .name-panel-minerva {
    font-size: 14px;
    font-weight: 600;
  }

  .user-info-panel-minerva .role-panel-minerva {
    font-size: 12px;
    color: var(--cafe-claro);
  }

  .avatar-panel-minerva {
    width: 42px;
    height: 42px;
    border-radius: 50%;
    background: var(--cafe-claro);
    color: var(--crema-claro);
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 700;
    font-size: 15px;
    border: 2px solid var(--crema-claro);
  }

  .btn-salir-panel-minerva {
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--rojo);
    color: var(--crema-claro);
    border: none;
    padding: 9px 18px;
    border-radius: 10px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: transform 0.15s ease, opacity 0.15s ease;
  }

  .btn-salir-panel-minerva:hover {
    opacity: 0.9;
    transform: translateY(-1px);
  }

  .btn-salir-panel-minerva svg {
    width: 16px;
    height: 16px;
  }

  /* ===== Main ===== */
  main .main-panel-minerva {
    flex: 1;
    padding: 36px 28px 48px;
    max-width: 1200px;
    width: 100%;
    margin: 0 auto;
  }

  .page-title-panel-minerva {
    margin-bottom: 6px;
    font-size: 26px;
    font-weight: 700;
    color: var(--cafe-oscuro);
  }

  .page-subtitle-panel-minerva {
    color: var(--cafe-claro);
    font-size: 15px;
    margin-bottom: 32px;
  }

  /* ===== Grilla de módulos ===== */
  .grid-panel-minerva {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 22px;
  }

  .modulo-panel-minerva {
    background: var(--crema-claro);
    border: 1px solid var(--borde);
    border-radius: 18px;
    padding: 26px 22px;
    cursor: pointer;
    text-align: left;
    display: flex;
    flex-direction: column;
    gap: 16px;
    box-shadow: var(--sombra);
    transition: transform 0.18s ease, box-shadow 0.18s ease, border-color 0.18s ease;
    position: relative;
    overflow: hidden;
  }

  .modulo-panel-minerva::after {
    content: "";
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 4px;
    background: var(--cafe-claro);
    transform: scaleX(0);
    transform-origin: left;
    transition: transform 0.25s ease;
  }

  .modulo-panel-minerva:hover {
    transform: translateY(-5px);
    box-shadow: 0 14px 32px rgba(74, 50, 32, 0.2);
    border-color: var(--cafe-claro);
  }

  .modulo-panel-minerva:hover::after {
    transform: scaleX(1);
  }

  .modulo-panel-minerva .icono-panel-minerva {
    width: 54px;
    height: 54px;
    border-radius: 14px;
    background: var(--crema);
    color: var(--cafe);
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.18s ease, color 0.18s ease;
  }

  .modulo-panel-minerva:hover .icono-panel-minerva {
    background: var(--cafe);
    color: var(--crema-claro);
  }

  .modulo-panel-minerva .icono-panel-minerva svg {
    width: 28px;
    height: 28px;
  }

  .modulo-panel-minerva h3 {
    font-size: 17px;
    font-weight: 700;
    color: var(--cafe-oscuro);
  }

  .modulo-panel-minerva p {
    font-size: 13px;
    color: var(--cafe-claro);
    line-height: 1.5;
  }

  footer .footer-panel-minerva {
    text-align: center;
    padding: 18px;
    font-size: 12px;
    color: var(--cafe-claro);
    border-top: 1px solid var(--borde);
  }

  @media (max-width: 600px) {
    .user-info-panel-minerva { display: none; }
    main { padding: 24px 16px 36px; }
    .grid-panel-minerva { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 16px; }
  }
</style>
</head>
<body>

  <header class="header-panel-minerva">
    <div class="brand-panel-minerva">
      <div class="brand-logo-panel-minerva">P</div>
      <div class="brand-text-panel-minerva">
        <h1>Panel Institucional</h1>
        <span>Sistema de Gestión</span>
      </div>
    </div>

    <div class="user-area-panel-minerva">
      <div class="user-info-panel-minerva">
        <div class="name-panel-minerva">Laura Méndez Rivera</div>
        <div class="role">Coordinadora General</div>
      </div>
      <div class="avatar">LM</div>
      <button class="btn-salir" onclick="salir()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
          <polyline points="16 17 21 12 16 7"/>
          <line x1="21" y1="12" x2="9" y2="12"/>
        </svg>
        Salir
      </button>
    </div>
  </header>

  <main>
    <h2 class="page-title">Bienvenida, Laura</h2>
    <p class="page-subtitle">Selecciona un módulo para comenzar</p>

    <div class="grid" id="grid"></div>
  </main>

  <footer>
    © 2026 Panel Institucional · Todos los derechos reservados
  </footer>

  <script>
    const modulos = [
      { titulo: "Dashboard", desc: "Resumen general e indicadores", icono: '<rect x="3" y="3" width="7" height="9"/><rect x="14" y="3" width="7" height="5"/><rect x="14" y="12" width="7" height="9"/><rect x="3" y="16" width="7" height="5"/>' },
      { titulo: "Recursos Humanos", desc: "Personal, nómina y expedientes", icono: '<path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/>' },
      { titulo: "Control Escolar", desc: "Alumnos, grupos y calificaciones", icono: '<path d="M22 10v6M2 10l10-5 10 5-10 5z"/><path d="M6 12v5c3 3 9 3 12 0v-5"/>' },
      { titulo: "Planeación Académica", desc: "Programas, horarios y materias", icono: '<rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/>' },
      { titulo: "Administración y Finanzas", desc: "Pagos, presupuestos y reportes", icono: '<line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/>' },
      { titulo: "Dirección", desc: "Gestión institucional y decisiones", icono: '<path d="M3 21h18"/><path d="M5 21V7l8-4v18"/><path d="M19 21V11l-6-4"/>' },
      { titulo: "Prefectura", desc: "Asistencia, conducta y disciplina", icono: '<path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/>' },
      { titulo: "Servicios Estudiantiles", desc: "Becas, trámites y apoyo al alumno", icono: '<path d="M22 12h-4l-3 9L9 3l-3 9H2"/>' },
      { titulo: "Seguridad", desc: "Accesos, vigilancia y protocolos", icono: '<path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>' },
      { titulo: "Configuración", desc: "Ajustes del sistema y permisos", icono: '<circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>' }
    ];

    const grid = document.getElementById("grid");
    modulos.forEach(m => {
      const card = document.createElement("button");
      card.className = "modulo";
      card.onclick = () => abrirModulo(m.titulo);
      card.innerHTML = `
        <div class="icono">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">${m.icono}</svg>
        </div>
        <div>
          <h3>${m.titulo}</h3>
          <p>${m.desc}</p>
        </div>`;
      grid.appendChild(card);
    });

    function abrirModulo(nombre) {
      alert("Abriendo módulo: " + nombre);
    }

    function salir() {
      if (confirm("¿Deseas cerrar sesión?")) {
        alert("Sesión cerrada");
      }
    }
  </script>

</body>
</html>
