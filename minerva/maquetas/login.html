<!DOCTYPE html>
<html lang="es" class="bg-crema">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Portal Administrativo — Iniciar Sesión</title>
  <meta name="description" content="Acceso al portal administrativo de la escuela." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Nunito+Sans:wght@400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="login.css" />
</head>
<body>
  <main class="login-wrapper">
    <!-- Mitad de la imagen con corte diagonal -->
    <section class="login-visual" aria-hidden="true">
      <img src="images/banner-1.png" alt="" class="login-visual__img" />
      <div class="login-visual__overlay"></div>
      <div class="login-visual__content">
        <span class="login-visual__badge">Portal Administrativo</span>
        <h2 class="login-visual__title">Escuela Vista Hermosa</h2>
        <p class="login-visual__text">
          Gestiona eventos, avisos y la oferta académica desde un solo lugar.
        </p>
      </div>
    </section>

    <!-- Mitad del formulario -->
    <section class="login-form-side">
      <div class="login-card">
        <header class="login-card__header">
          <div class="login-logo" aria-hidden="true">EVH</div>
          <h1 class="login-card__title">Bienvenido de nuevo</h1>
          <p class="login-card__subtitle">Inicia sesión para administrar el sitio</p>
        </header>

        <form class="login-form" action="#" method="post" novalidate>
          <div class="field">
            <label for="email">Correo electrónico</label>
            <input
              type="email"
              id="email"
              name="email"
              placeholder="admin@escuela.edu"
              autocomplete="email"
              required
            />
          </div>

          <div class="field">
            <label for="password">Contraseña</label>
            <input
              type="password"
              id="password"
              name="password"
              placeholder="••••••••"
              autocomplete="current-password"
              required
            />
          </div>

          <div class="login-form__row">
            <label class="checkbox">
              <input type="checkbox" name="remember" />
              <span>Recordarme</span>
            </label>
            <a href="#" class="login-form__link">¿Olvidaste tu contraseña?</a>
          </div>

          <button type="submit" class="btn-login">Iniciar sesión</button>
        </form>

        <footer class="login-card__footer">
          <a href="index.html" class="login-back">&larr; Volver al sitio principal</a>
        </footer>
      </div>
    </section>
  </main>
</body>
</html>
